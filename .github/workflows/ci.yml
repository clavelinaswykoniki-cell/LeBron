name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20]

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 安装依赖
        run: npm install --no-audit --no-fund

      - name: 语法检查
        run: npm run check:syntax

      - name: 匹配测试
        run: npm run test:match

      - name: 语料完整性
        run: npm run test:corpus

      - name: AI 兜底
        run: npm run test:ai-fallback

      - name: 段位单测
        run: npm run test:progression
